<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LYZR AI Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-lighter: #1a1f35;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f2e 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
            animation: slideInLeft 0.6s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .agent-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .conversation-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .conversation-item {
            padding: 12px 16px;
            background: var(--bg-lighter);
            border: 1px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-item:hover {
            background: var(--bg-card);
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .conversation-item.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(236, 72, 153, 0.1));
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .new-chat-btn {
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .new-chat-btn:active {
            transform: translateY(0);
        }

        .settings-btn {
            padding: 10px 16px;
            background: var(--bg-lighter);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .settings-btn:hover {
            background: var(--bg-card);
            border-color: var(--primary);
            color: var(--primary);
        }

        .chat-container {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideInRight 0.6s ease-out;
            overflow: hidden;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.05) 0%, transparent 100%);
        }

        .header-info h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-lighter);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .icon-btn:hover {
            background: var(--bg-card);
            border-color: var(--primary);
            color: var(--primary);
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .messages-area::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text-primary);
        }

        .empty-state p {
            font-size: 14px;
            text-align: center;
            max-width: 300px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.agent .message-avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .message.user .message-avatar {
            background: var(--bg-lighter);
            color: var(--primary);
        }

        .message-content {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-x: auto;
        }

        .message.agent .message-content {
            background: var(--bg-lighter);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        /* Markdown Styling */
        .message-content h1,
        .message-content h2,
        .message-content h3,
        .message-content h4,
        .message-content h5,
        .message-content h6 {
            margin: 12px 0 8px 0;
            font-weight: 700;
        }

        .message-content h1 {
            font-size: 18px;
        }

        .message-content h2 {
            font-size: 16px;
        }

        .message-content h3 {
            font-size: 15px;
        }

        .message-content h4,
        .message-content h5,
        .message-content h6 {
            font-size: 14px;
        }

        .message-content p {
            margin: 8px 0;
        }

        .message-content ul,
        .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message-content li {
            margin: 4px 0;
        }

        .message-content blockquote {
            border-left: 3px solid var(--primary);
            padding-left: 12px;
            margin: 8px 0;
            opacity: 0.8;
            font-style: italic;
        }

        .message-content code {
            background: rgba(0, 0, 0, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .message-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.4;
        }

        .message-content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }

        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
            font-size: 13px;
        }

        .message-content table th,
        .message-content table td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }

        .message-content table th {
            background: rgba(99, 102, 241, 0.1);
            font-weight: 600;
        }

        .message-content table tr:nth-child(even) {
            background: rgba(0, 0, 0, 0.1);
        }

        .message-content a {
            color: var(--primary);
            text-decoration: none;
            border-bottom: 1px solid var(--primary);
        }

        .message-content a:hover {
            opacity: 0.8;
        }

        .message-content hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 12px 0;
        }

        .message-content strong {
            font-weight: 700;
        }

        .message-content em {
            font-style: italic;
        }

        .message-content del {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-lighter);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            width: fit-content;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typingAnimation 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            background: linear-gradient(180deg, transparent 0%, rgba(99, 102, 241, 0.02) 100%);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            background: var(--bg-lighter);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-field::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--success);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .error-message {
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .modal-field input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-lighter);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        .modal-field input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .modal-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .modal-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
        }

        .modal-btn.secondary {
            background: var(--bg-lighter);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .modal-btn.secondary:hover {
            background: var(--bg-card);
            border-color: var(--primary);
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 12px;
                padding: 12px;
            }

            .sidebar {
                width: 100%;
                max-height: 200px;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
            }

            .sidebar-header {
                flex-shrink: 0;
            }

            .conversation-list {
                flex-direction: row;
                flex: 1;
                overflow-x: auto;
                overflow-y: hidden;
            }

            .conversation-item {
                flex-shrink: 0;
                min-width: 150px;
            }

            .chat-container {
                height: calc(100vh - 220px);
            }

            .message-content {
                max-width: 85%;
            }

            .modal-content {
                max-width: 90%;
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="agent-icon">🤖</div>
                <h1>LYZR Agent</h1>
            </div>

            <button class="new-chat-btn" onclick="createNewChat()">
                ➕ New Chat
            </button>

            <div class="conversation-list" id="conversationList">
                <div class="conversation-item active" onclick="loadConversation(this, 'default')">
                    Chat 1
                </div>
            </div>

            <button class="settings-btn" onclick="openSettingsModal()">
                ⚙️ Settings
            </button>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <!-- Header -->
            <div class="chat-header">
                <div class="header-info">
                    <h2>Chat with LYZR Agent</h2>
                    <span class="status-badge">
                        <span class="status-dot"></span>
                        Ready
                    </span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" title="Clear chat" onclick="clearChat()">🗑️</button>
                </div>
            </div>

            <!-- Messages -->
            <div class="messages-area" id="messagesArea">
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <h3>Start a Conversation</h3>
                    <p>Type a message below to begin chatting with your LYZR AI agent</p>
                </div>
            </div>

            <!-- Input -->
            <div class="input-area">
                <div id="errorContainer"></div>
                <div class="input-wrapper">
                    <textarea 
                        class="input-field" 
                        id="messageInput" 
                        placeholder="Type your message here..." 
                        rows="1"
                        onkeypress="handleKeyPress(event)"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send message">
                        📤
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">API Configuration</div>
            
            <div class="modal-field">
                <label>API Key</label>
                <input 
                    type="password" 
                    id="apiKey" 
                    placeholder="sk-default-..." 
                    value="sk-default-ABArLtiK6BPljuSx0HRHwPpmI5Af5qN5"
                >
            </div>

            <div class="modal-field">
                <label>User ID</label>
                <input 
                    type="text" 
                    id="userId" 
                    placeholder="your@email.com"
                    value="saiasham@pronixinc.com"
                >
            </div>

            <div class="modal-field">
                <label>Agent ID</label>
                <input 
                    type="text" 
                    id="agentId" 
                    placeholder="agent_id"
                    value="69aaced48e8c54ee03f09336"
                >
            </div>

            <div class="modal-field">
                <label>Session ID</label>
                <input 
                    type="text" 
                    id="sessionId" 
                    placeholder="session_id"
                    value="69aaced48e8c54ee03f09336-wzgqwu5ys7"
                >
            </div>

            <div class="modal-actions">
                <button class="modal-btn primary" onclick="saveSettings()">Save</button>
                <button class="modal-btn secondary" onclick="closeSettingsModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Simple Markdown parser
        function parseMarkdown(text) {
            if (!text) return text;
            
            let html = text;

            // Escape HTML
            html = html.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;');

            // Re-unescape code blocks and inline code (will handle separately)
            // Code blocks (triple backticks)
            html = html.replace(/```([\s\S]*?)```/g, (match, code) => {
                return `<pre><code>${code.trim()}</code></pre>`;
            });

            // Inline code (single backticks)
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Headers
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

            // Horizontal rule
            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^\*\*\*$/gm, '<hr>');

            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.+?)_/g, '<em>$1</em>');

            // Strikethrough
            html = html.replace(/~~(.*?)~~/g, '<del>$1</del>');

            // Links
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Blockquotes
            html = html.replace(/^&gt; (.*?)$/gm, '<blockquote>$1</blockquote>');

            // Unordered lists
            html = html.replace(/^\* (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/^- (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/^(\d+)\. (.*?)$/gm, '<li>$2</li>');
            html = html.replace(/(<li>.*?<\/li>)/s, (match) => {
                return '<ul>' + match + '</ul>';
            });

            // Tables
            html = html.replace(/\|(.+?)\|/g, (match, content) => {
                const cells = content.split('|').filter(c => c.trim());
                const isHeader = content.includes('---') || content.match(/:\-+:|---/);
                if (cells.length > 0) {
                    const cellHtml = cells.map(cell => {
                        return `<td>${cell.trim().replace(/^[\s\-:]+$/, '')}</td>`;
                    }).join('');
                    return `<tr>${cellHtml}</tr>`;
                }
                return match;
            });

            html = html.replace(/(<tr>.*?<\/tr>)/s, (match) => {
                return '<table>' + match + '</table>';
            });

            // Line breaks
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            html = html.replace(/<p><\/p>/g, '');

            // Wrap in div for safety
            const div = document.createElement('div');
            div.innerHTML = html;
            return div;
        }

        function formatDecisionMakers(text) {
            if (!text.includes("Decision Makers or Relevant Roles")) {
                return text;
            }
        
            const sectionStart = text.indexOf("Decision Makers or Relevant Roles");
            const beforeSection = text.substring(0, sectionStart);
            const sectionText = text.substring(sectionStart);
        
            const lines = sectionText.split('\n');
            let formatted = [];
            formatted.push("\n## Decision Makers or Relevant Roles\n");
        
            for (let line of lines) {
                if (line.includes('|')) {
                    const parts = line.split('|').map(p => p.trim()).filter(p => p);
        
                    if (parts.length >= 5) {
                        formatted.push(`
        **Name:** ${parts[0]}  
        **Title:** ${parts[1]}  
        **Company:** ${parts[2]}  
        **Email:** ${parts[3]}  
        **LinkedIn:** ${parts[4]}  
        ---
                        `);
                    }
                }
            }
        
            return beforeSection + formatted.join('\n');
        }
        let config = {
            apiKey: 'sk-default-ABArLtiK6BPljuSx0HRHwPpmI5Af5qN5',
            userId: 'saiasham@pronixinc.com',
            agentId: '69aaced48e8c54ee03f09336',
            sessionId: '69aaced48e8c54ee03f09336-wzgqwu5ys7',
            apiEndpoint: 'https://agent-prod.studio.lyzr.ai/v3/inference/chat/'
        };

        // State
        let conversations = {
            'default': []
        };
        let currentConversation = 'default';
        let isLoading = false;

        // Load configuration from localStorage
        function loadConfig() {
            const saved = localStorage.getItem('lyzrConfig');
            if (saved) {
                config = { ...config, ...JSON.parse(saved) };
                document.getElementById('apiKey').value = config.apiKey;
                document.getElementById('userId').value = config.userId;
                document.getElementById('agentId').value = config.agentId;
                document.getElementById('sessionId').value = config.sessionId;
            }
        }

        // Auto-resize textarea
        function autoResizeTextarea() {
            const textarea = document.getElementById('messageInput');
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
        }

        document.getElementById('messageInput').addEventListener('input', autoResizeTextarea);

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || isLoading) return;

            // Add user message to UI
            addMessageToUI('user', message);
            input.value = '';
            input.style.height = 'auto';

            // Add to conversation
            conversations[currentConversation].push({
                role: 'user',
                content: message,
                timestamp: new Date()
            });

            // Show typing indicator
            showTypingIndicator();
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                // Send to LYZR API
                const response = await fetch(config.apiEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': config.apiKey
                    },
                    body: JSON.stringify({
                        user_id: config.userId,
                        agent_id: config.agentId,
                        session_id: config.sessionId,
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                
                // Extract response message
                let agentMessage = '';
                if (data.response) {
                    agentMessage = data.response;
                } else if (data.message) {
                    agentMessage = data.message;
                } else if (data.data) {
                    agentMessage = typeof data.data === 'string' ? data.data : JSON.stringify(data.data);
                } else {
                    agentMessage = JSON.stringify(data);
                }

                removeTypingIndicator();

                // Format Decision Makers section
                agentMessage = formatDecisionMakers(agentMessage);

                addMessageToUI('agent', agentMessage);

                // Add to conversation
                conversations[currentConversation].push({
                    role: 'agent',
                    content: agentMessage,
                    timestamp: new Date()
                });

                clearError();
            } catch (error) {
                removeTypingIndicator();
                showError(`Error: ${error.message}`);
                console.error('Error sending message:', error);
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // Add message to UI
        function addMessageToUI(role, content) {
            const messagesArea = document.getElementById('messagesArea');
            
            // Remove empty state if present
            const emptyState = messagesArea.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // Parse Markdown for agent messages, plain text for user messages
            if (role === 'agent') {
                const parsed = parseMarkdown(content);
                contentDiv.appendChild(parsed);
            } else {
                contentDiv.textContent = content;
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const messagesArea = document.getElementById('messagesArea');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message agent';
            messageDiv.id = 'typingIndicator';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(typingDiv);
            
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Show error message
        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `
                <div class="error-message">
                    ⚠️ ${message}
                </div>
            `;
            setTimeout(() => clearError(), 5000);
        }

        // Clear error message
        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }

        // Create new chat
        function createNewChat() {
            const chatNumber = Object.keys(conversations).length + 1;
            const chatId = `chat-${Date.now()}`;
            conversations[chatId] = [];
            
            const list = document.getElementById('conversationList');
            const item = document.createElement('div');
            item.className = 'conversation-item';
            item.textContent = `Chat ${chatNumber}`;
            item.onclick = () => loadConversation(item, chatId);
            
            list.appendChild(item);
            loadConversation(item, chatId);
        }

        // Load conversation
        function loadConversation(element, chatId) {
            document.querySelectorAll('.conversation-item').forEach(el => {
                el.classList.remove('active');
            });
            element.classList.add('active');
            currentConversation = chatId;
            
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            
            if (conversations[chatId].length === 0) {
                messagesArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <h3>Start a Conversation</h3>
                        <p>Type a message below to begin chatting with your LYZR AI agent</p>
                    </div>
                `;
            } else {
                conversations[chatId].forEach(msg => {
                    addMessageToUI(msg.role, msg.content);
                });
            }
        }

        // Clear chat
        function clearChat() {
            if (confirm('Are you sure you want to clear this conversation?')) {
                conversations[currentConversation] = [];
                const messagesArea = document.getElementById('messagesArea');
                messagesArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">💬</div>
                        <h3>Start a Conversation</h3>
                        <p>Type a message below to begin chatting with your LYZR AI agent</p>
                    </div>
                `;
            }
        }

        // Settings modal functions
        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function saveSettings() {
            config.apiKey = document.getElementById('apiKey').value;
            config.userId = document.getElementById('userId').value;
            config.agentId = document.getElementById('agentId').value;
            config.sessionId = document.getElementById('sessionId').value;
            
            localStorage.setItem('lyzrConfig', JSON.stringify(config));
            closeSettingsModal();
            showError('✅ Settings saved successfully!');
        }

        // Close modal on outside click
        document.getElementById('settingsModal').addEventListener('click', (e) => {
            if (e.target.id === 'settingsModal') {
                closeSettingsModal();
            }
        });

        // Initialize
        loadConfig();
    </script>
</body>
